<body>
    <div class="wrapper">
        <header>
            <div class="header-left">
                <a href="#"><span class="naslov">Knjige</span>.rs</a>
            </div>

                    <li><a href="#" class="active">Knjige</a></li>

                </div>

        <footer>
            <div class="footer-card">
                <p class="footer-stat">1240</p>
                <p class="footer-value">knjiga</p>
            </div>

            <div class="footer-card">
                <p class="footer-stat">380</p>
                <p class="footer-value">autora</p>
            </div>

            <div class="footer-card">
                <p class="footer-stat">8500</p>

            </div>
