<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocetna stranica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="header-left">
                <a href="#"><span class="folio">Knjige</span>.rs</a>
            </div>

            <div class="header-center">
                <ul>
                    <li><a href="#">Knjige</a></li>
                    <li><a href="#">Autori</a></li>
                    <li><a href="#">Moj profil</a></li>
                </ul>
            </div>

            <div class="header-right">
                <button class="button login">Prijava</button>
                <button class="button register">Registracija</button>
            </div>
        </header>

        <main>
            <div class="hero-section">
                <div class="landing">
                    <div class="landing-text">
                        <h2>Otkrij svoju sledecu omiljenu knjigu</h2>
                        <p>Zajednica citalaca gde mozes istrazivati ocenjivati i deliti ljubav prema knjigama.</p>
                        <div class="landing-buttons">
                            <button class="button katalog">Istrazi katalog</button>
                            <button class="button autori">Pogledaj autore</button>
                        </div>
                    </div>

                    <div class="landing-image">

                    </div>
                </div>
                    
                <div class="search-filters">
                    <input type="search" class="search-bar" placeholder="Pretrazite knjige po nazivu ili zanru...">
                    <button class="filter-card">Sve</button>
                    <button class="filter-card">Sci-fi</button>
                    <button class="filter-card">Roman</button>
                    <button class="filter-card">Triler</button>
                    <button class="filter-card">Fantazija</button>
                    
                </div>
            </div>

            <div class="books">

            </div>
        </main>

        <footer>
            
        </footer>
    </div>
</body>
</html>
